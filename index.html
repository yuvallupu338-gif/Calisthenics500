    <style>
        :root {
            --brand-orange: #f97316;
            --brand-red: #dc2626;
            --bg-dark: #000000;
            --panel-bg: #18181b;
        }

        body { 
            background-color: var(--bg-dark); 
            color: #ffffff; 
            font-family: system-ui, -apple-system, sans-serif; 
            margin: 0; 
            padding: 0; 
            overscroll-behavior-y: none; 
            line-height: 1.6;
        }

        ::-webkit-scrollbar { display: none; }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .pulse-orange { animation: pulseGlow 2s infinite; }
        @keyframes pulseGlow { 
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.5); } 
            70% { box-shadow: 0 0 0 15px rgba(249, 115, 22, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); } 
        }

        input, button { 
            touch-action: manipulation; 
            outline: none; 
            -webkit-tap-highlight-color: transparent;
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>

</head>

        // ==========================================

        // ==========================================

                { target: 'pull', name: 'משיכות מתח בסיסיות', reps: '8' },

        // ==========================================
        // 4. MEAL PLANS (Dynamic & Thematic)
        // ==========================================
        const MEAL_PLANS = {
            training: {
                morning: [
                    { name: 'שייק חלבון ושיבולת שועל', tags: ['lactose'], ings: 'חלב, סקופ חלבון, בננה, חמאת בוטנים טבעית' },

                    { name: 'קערת יוגורט ופירות יער', tags: ['lactose', 'nuts'], ings: 'יוגורט חלבון 0%, חופן שקדים, פירות יער קפואים' }

                ],

                ]
            },
            sick: {
                morning: [
                    { name: 'תה צמחים ועוגיות מנחמות', tags: ['gluten'], ings: 'תה נענע או קמומיל, כפית דבש, עוגיות יבשות פריכות' }, 
                    { name: 'טוסט לחם לבן וממרח מתוק', tags: ['lactose', 'gluten'], ings: 'לחם לבן רך וקל לעיכול, ממרח שוקולד איכותי או ריבה' }
                ],
                lunch: [
                    { name: 'מרק עוף צח של סבתא', tags: [], ings: 'עוף מכובס היטב, אטריות דקות, גזר מבושל רך, המון נוזלים' }, 
                    { name: 'פירה תפוחי אדמה חם', tags: ['lactose'], ings: 'תפוחי אדמה מבושלים רך מאוד, מעט חמאה, מלח ים' }
                ],
                evening: [
                    { name: 'דייסת סולת נוסטלגית', tags: ['gluten', 'lactose'], ings: 'חלב מחומם, סולת, מעט סוכר חום וקינמון מעל' }, 
                    { name: 'מעדן פודינג וניל קריר', tags: ['lactose'], ings: 'פודינג וניל חלק, קל מאוד לבליעה ולעיכול מהיר' }
                ]
            }
        };

        const ALLERGY_MAP = {
            'בוטנים': 'peanut', 'אגוזים': 'nuts', 'גלוטן': 'gluten', 
            'לקטוז': 'lactose', 'ביצים': 'egg', 'דגים': 'fish', 'סויה': 'soy'
        };

        const HEBREW_DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

        // ==========================================
        // 5. HELPER LOGIC
        // ==========================================
        const generateDynamicWorkout = (workoutType, masteredIds, requestedDuration) => {
            // התחלה מתרגילי הבסיס
            let currentWorkout = [...BASE_WORKOUTS[workoutType]];
            
            // החלפת תרגילי בסיס בתרגילים מתקדמים שהמשתמש פתח בעץ המיומנויות
            masteredIds.forEach(id => {
                const advancedSkill = SKILLS.find(skill => skill.id === id);
                if (advancedSkill) {
                    const baseIndexToReplace = currentWorkout.findIndex(baseEx => baseEx.target === advancedSkill.target);
                    if (baseIndexToReplace !== -1) {
                        currentWorkout[baseIndexToReplace] = {
                            ...advancedSkill,
                            reps: 'עד כשל (מקסימום נקי)',
                            isMastered: true
                        };
                    }
                }
            });

            // הגדרת משתני אימון בהתאם לזמן שהמשתמש בחר
            let targetExercisesCount = 4;
            let targetSetsCount = 3;

            if (requestedDuration === 45) { targetExercisesCount = 5; targetSetsCount = 3; }
            if (requestedDuration === 60) { targetExercisesCount = 5; targetSetsCount = 4; }
            if (requestedDuration === 90) { targetExercisesCount = 6; targetSetsCount = 4; }

            // הוספת תרגילי השלמה אם צריך למלא את הזמן
            if (targetExercisesCount > currentWorkout.length) {
                currentWorkout.push(
                    { target: 'core', name: 'כפיפות בטן מלאות', reps: '20' },
                    { target: 'core', name: 'הרמות רגליים בשכיבה', reps: '15' }
                );
            }

            // חיתוך המערך לאורך הרצוי והוספת מספר הסטים
            return currentWorkout.slice(0, targetExercisesCount).map(exercise => ({
                name: exercise.name,
                sets: targetSetsCount,
                reps: exercise.reps,
                isMastered: exercise.isMastered || false
            }));
        };

        // ==========================================
        // 6. MAIN APPLICATION STATE MANAGER
        // ==========================================
        function App() {
            const [currentScreen, setScreen] = useState('splash');
            const [userAnswers, setAnswers] = useState({});
            const [questionIndex, setQuestionIndex] = useState(0);
            const [userXP, setXp] = useState(0);
            const [completedWorkouts, setWorkouts] = useState(0);
            const [masteredSkills, setMastered] = useState([]);
            const [toastMessage, setToast] = useState(null);
            const [hasAgreedToHealth, setHealthAgreed] = useState(false);
            
            // תיקון באג קריטי - מניעת זליגת טקסט משאלה לשאלה (Input Bleeding)
            const [localInputValue, setLocalInput] = useState('');

            // שאיבת נתונים שמורים עם הפעלת האפליקציה
            useEffect(() => {
                const savedData = localStorage.getItem('fitai_v_absolute');
                if (savedData) {
                    const parsedData = JSON.parse(savedData);
                    setAnswers(parsedData.ans || {});
                    setXp(parsedData.xp || 0);
                    setWorkouts(parsedData.workouts || 0);
                    setMastered(parsedData.mastered || []);
                    setHealthAgreed(true);
                    setScreen('app'); // כניסה ישירה לאפליקציה אם יש נתונים
                }
            }, []);

            const saveProgressToStorage = (newXP, newWorkoutsCount, newMasteredArray, updatedAnswers = userAnswers) => {
                setXp(newXP);
                setWorkouts(newWorkoutsCount);
                setMastered(newMasteredArray);
                localStorage.setItem('fitai_v_absolute', JSON.stringify({
                    ans: updatedAnswers,
                    xp: newXP,
                    workouts: newWorkoutsCount,
                    mastered: newMasteredArray
                }));
            };

            const triggerToastNotification = (message) => {
                setToast(message);
                setTimeout(() => setToast(null), 3000);
            };

            // סינון חכם לשאלת הציוד אם נבחר חדר כושר (כי יש שם הכל)
            const filteredQuestions = useMemo(() => {
                return ALL_QUESTIONS.filter(q => {
                    if (q.id === 'equip' && userAnswers.location && userAnswers.location.includes('חדר כושר')) return false;
                    return true;
                });
            }, [userAnswers.location]);
// --- SPLASH SCREEN ---
            if (currentScreen === 'splash') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-black text-center p-6 fade-in relative overflow-hidden">
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] bg-orange-600 rounded-full opacity-20 blur-[100px] pulse-orange"></div>
                        <div className="relative z-10 w-full max-w-sm">
                            <h1 className="text-7xl font-black bg-clip-text text-transparent bg-gradient-to-r from-orange-400 to-red-600 mb-6 tracking-tighter">Fitai</h1>
                            <p className="text-zinc-400 text-lg mb-12 font-medium tracking-wide">המכונה המושלמת לקליסטניקס.</p>
                            <button onClick={() => setScreen('health')} className="w-full bg-white text-black px-12 py-5 rounded-2xl font-black text-xl hover:scale-105 transition-transform shadow-[0_0_30px_rgba(255,255,255,0.2)]">
                                התחל איפיון מקיף
                            </button>
                        </div>
                    </div>
                );
            }

            // --- HEALTH DISCLAIMER SCREEN ---
            if (currentScreen === 'health') {
                return (
                    <div className="min-h-screen flex flex-col p-6 bg-black fade-in text-right">
                        <div className="flex-1 pt-4 max-w-md mx-auto w-full flex flex-col">
                            <div className="text-orange-500 font-bold uppercase tracking-widest text-sm mb-2">מסמך משפטי מחייב</div>
                            <h2 className="text-3xl font-black mb-6 text-white">בטיחות לפני הכל.</h2>
                            
                            <div className="flex-1 bg-zinc-900 rounded-3xl p-6 border border-zinc-800 mb-6 space-y-5 text-zinc-300 text-sm overflow-y-auto max-h-[50vh] hide-scroll shadow-inner">
                                <p><b className="text-white block mb-1 text-base">1. פטור נזיקין מוחלט:</b> האימונים באחריותך הבלעדית. איננו נושאים באחריות משפטית, אזרחית או פלילית לפציעה, נזק גופני, אובדן או נזק לרכוש.</p>
                                <p><b className="text-white block mb-1 text-base">2. אישור רפואי:</b> חובה להתייעץ עם גורם רפואי מוסמך טרם התחלת כל תוכנית אימונים עצימה באפליקציה.</p>
                                <p><b className="text-white block mb-1 text-base">3. אין אגו בקליסטניקס:</b> הרגשת כאב חד, סחרחורת או בחילה? יש להפסיק את האימון באופן מיידי. עבודה על פציעה רק תחמיר אותה.</p>
                                <p><b className="text-white block mb-1 text-base">4. המלצות תזונה:</b> התפריטים המוצגים הם המלצה כללית מבוססת TDEE בלבד. התאמות לאלרגיות ומצבים רפואיים הינן באחריותך המלאה.</p>
                            </div>
                            
                            <button onClick={() => setHealthAgreed(!hasAgreedToHealth)} className={`flex justify-between items-center p-5 rounded-2xl border-2 mb-4 transition-all duration-300 ${hasAgreedToHealth ? 'border-orange-500 bg-orange-500/10' : 'border-zinc-700 hover:border-zinc-600'}`}>
                                <div className={`w-6 h-6 rounded flex items-center justify-center border-2 transition-colors ${hasAgreedToHealth ? 'bg-orange-500 border-orange-500' : 'border-zinc-500'}`}>
                                    {hasAgreedToHealth && <span className="text-white text-xs font-black">✓</span>}
                                </div>
                                <span className="font-bold text-sm text-white">קראתי, הבנתי ואני מאשר/ת הכל</span>
                            </button>
                            
                            <button disabled={!hasAgreedToHealth} onClick={() => setScreen('q')} className={`w-full py-4 rounded-2xl font-black text-xl transition-all duration-300 ${hasAgreedToHealth ? 'bg-white text-black active:scale-95 shadow-[0_0_20px_rgba(255,255,255,0.2)]' : 'bg-zinc-900 text-zinc-600 opacity-50 cursor-not-allowed'}`}>
                                המשך לשאלון המקצועי
                            </button>
                        </div>
                    </div>
                );
            }

            // --- QUESTIONNAIRE SCREEN ---
            if (currentScreen === 'q') {
                const activeQ = filteredQuestions[questionIndex];
                
                // עדכון הערך המקומי של תיבת הטקסט בכל מעבר שאלה למניעת Input Bleeding
                useEffect(() => {
                    setLocalInput(userAnswers[activeQ.id] || '');
                }, [questionIndex, activeQ.id, userAnswers]);

                const validateInput = () => {
                    if (activeQ.type === 'text' || activeQ.type === 'number') {
                        return localInputValue.toString().trim() !== '';
                    }
                    const answer = userAnswers[activeQ.id];
                    if (Array.isArray(answer)) return answer.length > 0;
                    return !!answer;
                };

                const proceedToNextQuestion = () => {
                    let newAnswersObj = { ...userAnswers };
                    
                    // שמירת תיבת הטקסט
                    if (activeQ.type === 'text' || activeQ.type === 'number') {
                        newAnswersObj[activeQ.id] = localInputValue;
                    }
                    
                    setAnswers(newAnswersObj);

                    if (questionIndex < filteredQuestions.length - 1) {
                        setQuestionIndex(questionIndex + 1);
                    } else {
                        // סיום שאלון ושמירה ראשונית
                        saveProgressToStorage(0, 0, [], newAnswersObj);
                        setScreen('app');
                    }
                };

                return (
                    <div className="min-h-screen p-6 bg-black text-right fade-in flex flex-col max-w-md mx-auto">
                        <div className="flex justify-between items-center mb-4">
                            <button onClick={() => { if (questionIndex === 0) setScreen('health'); else setQuestionIndex(questionIndex - 1); }} className="text-zinc-500 text-3xl font-black p-2 hover:text-white transition-colors">&rarr;</button>
                            <div className="text-xs text-zinc-500 font-bold uppercase tracking-widest">שאלה {questionIndex + 1} מתוך {filteredQuestions.length}</div>
                        </div>
                        
                        <div className="w-full h-1.5 bg-zinc-900 rounded-full mb-10 overflow-hidden">
                            <div className="h-full bg-gradient-to-l from-orange-500 to-red-600 transition-all duration-300" style={{ width: `${((questionIndex + 1) / filteredQuestions.length) * 100}%` }} />
                        </div>
                        
                        <h2 className="text-3xl font-black mb-8 text-white leading-tight">{activeQ.q}</h2>
                        
                        <div className="flex-1 overflow-y-auto hide-scroll pb-6">
                            {activeQ.type === 'choice' ? activeQ.options.map(opt => (
                                <button key={opt} onClick={() => { 
                                    let updatedAns = { ...userAnswers, [activeQ.id]: opt };
                                    
                                    // הזרקת ציוד אוטומטית לחדר כושר כדי לחסוך שאלות
                                    if (activeQ.id === 'location') {
                                        if (opt.includes('חדר כושר')) {
                                            updatedAns.equipment = ['מוט מתח','מקבילים','טבעות אולימפיות','גומיות התנגדות','פרלטס'];
                                        } else {
                                            updatedAns.equipment = [];
                                        }
                                    }
                                    
                                    setAnswers(updatedAns); 
                                    
                                    if (questionIndex < filteredQuestions.length - 1) {
                                        setQuestionIndex(questionIndex + 1);
                                    } else {
                                        saveProgressToStorage(0, 0, [], updatedAns); 
                                        setScreen('app');
                                    } 
                                }} className={`w-full p-5 mb-3 rounded-2xl border-2 text-right font-bold text-lg transition-all duration-200 ${userAnswers[activeQ.id] === opt ? 'border-orange-500 bg-orange-500/10 text-white' : 'bg-zinc-900 border-zinc-800 text-zinc-400 hover:border-zinc-700'}`}>
                                    {opt}
                                </button>
                            )) : 
                            
                            activeQ.type === 'multi' || activeQ.type === 'days' ? activeQ.options.map(opt => {
                                const isSelected = (userAnswers[activeQ.id] || []).includes(opt);
                                return (
                                    <button key={opt} onClick={() => {
                                        let currentSelections = userAnswers[activeQ.id] || [];
                                        const exclusiveOptions = ['ללא', 'ללא פציעות', 'ללא ציוד בכלל', 'ללא תוספים'];
                                        
                                        if (exclusiveOptions.includes(opt)) {
                                            currentSelections = [opt];
                                        } else {
                                            // מסיר בחירות אקסקלוסיביות אם נבחר משהו אחר
                                            const filteredSelections = currentSelections.filter(x => !exclusiveOptions.includes(x));
                                            currentSelections = filteredSelections.includes(opt) ? filteredSelections.filter(x => x !== opt) : [...filteredSelections, opt];
                                        }
                                        
                                        setAnswers({ ...userAnswers, [activeQ.id]: currentSelections });
                                    }} className={`w-full flex justify-between items-center p-5 mb-3 rounded-2xl border-2 font-bold text-lg transition-all duration-200 ${isSelected ? 'bg-orange-500/10 border-orange-500 text-white' : 'bg-zinc-900 border-zinc-800 text-zinc-400 hover:border-zinc-700'}`}>
                                        {isSelected ? <span className="text-orange-500 font-black text-xl">✓</span> : <span></span>}
                                        <span>{opt}</span>
                                    </button>
                                );
                            }) : 
                            
                            <input type={activeQ.type} placeholder={activeQ.placeholder} min={activeQ.min} max={activeQ.max} value={localInputValue} onChange={e => setLocalInput(e.target.value)} className="w-full bg-zinc-900 p-5 rounded-2xl border border-zinc-800 mb-6 text-xl text-white font-bold text-right outline-none focus:border-orange-500 transition-colors" autoFocus />
                            }
                        </div>
                        
                        <button disabled={!validateInput()} onClick={proceedToNextQuestion} className={`w-full py-4 rounded-2xl font-black mt-2 text-xl transition-all duration-300 ${validateInput() ? 'bg-white text-black active:scale-95 shadow-lg' : 'bg-zinc-900 text-zinc-600 opacity-50 cursor-not-allowed'}`}>
                            המשך לשאלה הבאה
                        </button>
                    </div>
                );
            }

            // הפנייה למערכת הטאבים המרכזית של האפליקציה
            return <MainApplicationManager userAnswers={userAnswers} userXP={userXP} masteredSkills={masteredSkills} completedWorkouts={completedWorkouts} saveProgressToStorage={saveProgressToStorage} toastMessage={toastMessage} triggerToastNotification={triggerToastNotification} resetApp={() => { localStorage.clear(); location.reload(); }} />;
        }

        // ==========================================
        // 7. MAIN APPLICATION TABS CONTROLLER
        // ==========================================
        function MainApplicationManager({ userAnswers, userXP, masteredSkills, completedWorkouts, saveProgressToStorage, toastMessage, triggerToastNotification, resetApp }) {
            const [currentTab, setTab] = useState('home');
            const [activeWorkoutDuration, setActiveWorkoutDuration] = useState(null); // Null = לא באימון כרגע

            return (
                <div className="min-h-screen bg-black flex flex-col font-sans max-w-md mx-auto relative overflow-hidden">
                    <div className="flex-1 pb-24">
                        {currentTab === 'home' && !activeWorkoutDuration && <DashboardView userAnswers={userAnswers} userXP={userXP} completedWorkouts={completedWorkouts} masteredSkills={masteredSkills} startWorkout={(minutes) => setActiveWorkoutDuration(minutes)} resetApp={resetApp} />}
                        
                        {currentTab === 'home' && activeWorkoutDuration && <WorkoutExecutionView userAnswers={userAnswers} masteredSkills={masteredSkills} duration={activeWorkoutDuration} onWorkoutFinish={() => { saveProgressToStorage(userXP + 100, completedWorkouts + 1, masteredSkills); triggerToastNotification('🔥 אימון הופצץ בהצלחה! +100 XP'); }} onWorkoutExit={() => setActiveWorkoutDuration(null)} />}
                        
                        {currentTab === 'skills' && !activeWorkoutDuration && <SkillTreeView userXP={userXP} masteredSkills={masteredSkills} toggleSkill={(skillId) => {
                            const newMasteredArray = masteredSkills.includes(skillId) ? masteredSkills.filter(x => x !== skillId) : [...masteredSkills, skillId];
                            saveProgressToStorage(userXP, completedWorkouts, newMasteredArray);
                        }} triggerToastNotification={triggerToastNotification} />}
                        
                        {currentTab === 'diet' && !activeWorkoutDuration && <NutritionView userAnswers={userAnswers} />}
                    </div>
                    
                    {toastMessage && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-50 bg-white text-black px-8 py-4 rounded-full shadow-[0_10px_30px_rgba(255,255,255,0.2)] font-black text-sm tracking-wide w-max max-w-[90%] text-center fade-in border border-zinc-200">
                            {toastMessage}
                        </div>
                    )}
                    
                    {!activeWorkoutDuration && (
                        <nav className="fixed bottom-0 w-full bg-zinc-950/90 backdrop-blur-lg border-t border-zinc-900 flex justify-around p-3 pb-safe pt-4 rounded-t-[40px] z-40 max-w-md mx-auto left-1/2 -translate-x-1/2 shadow-[0_-10px_40px_rgba(0,0,0,0.8)]">
                            <button onClick={() => setTab('home')} className={`flex flex-col items-center transition-all duration-300 ${currentTab === 'home' ? 'text-white scale-110 -translate-y-2' : 'text-zinc-600 hover:text-zinc-400'}`}>
                                <span className="text-2xl mb-1 drop-shadow-md">🏠</span>
                                <span className="text-[10px] font-bold tracking-wider">בית</span>
                            </button>
                            <button onClick={() => setTab('skills')} className={`flex flex-col items-center transition-all duration-300 ${currentTab === 'skills' ? 'text-white scale-110 -translate-y-2' : 'text-zinc-600 hover:text-zinc-400'}`}>
                                <span className="text-2xl mb-1 drop-shadow-md">🌳</span>
                                <span className="text-[10px] font-bold tracking-wider">עץ מיומנויות</span>
                            </button>
                            <button onClick={() => setTab('diet')} className={`flex flex-col items-center transition-all duration-300 ${currentTab === 'diet' ? 'text-white scale-110 -translate-y-2' : 'text-zinc-600 hover:text-zinc-400'}`}>
                                <span className="text-2xl mb-1 drop-shadow-md">🥩</span>
                                <span className="text-[10px] font-bold tracking-wider">תזונה חכמה</span>
                            </button>
                        </nav>
                    )}
                </div>
            );
        }

        // ==========================================
        // 8. DASHBOARD VIEW (HOME)
        // ==========================================
        function DashboardView({ userAnswers, userXP, completedWorkouts, masteredSkills, startWorkout, resetApp }) {
            const currentDayHebrew = HEBREW_DAYS[new Date().getDay()];
            const isWorkoutDayToday = userAnswers.days?.includes(currentDayHebrew);
            const [showTimeModal, setShowTimeModal] = useState(false);
            
            let workoutTypeForToday = 'fbw'; 
            let workoutTitleForToday = 'פולבאדי (גוף שלם)';
            
            if (userAnswers.days?.length >= 3 && isWorkoutDayToday) { 
                workoutTypeForToday = userAnswers.days.indexOf(currentDayHebrew) % 2 === 0 ? 'upper' : 'lower'; 
                workoutTitleForToday = workoutTypeForToday === 'upper' ? 'פלג גוף עליון' : 'פלג גוף תחתון'; 
            }
            
            // תצוגה מקדימה של האימון
            let previewWorkout = [...BASE_WORKOUTS[workoutTypeForToday]];
            masteredSkills.forEach(skillId => { 
                const skillObj = SKILLS.find(x => x.id === skillId); 
                if (skillObj) { 
                    const baseIndex = previewWorkout.findIndex(b => b.target === skillObj.target && !b.isMastered); 
                    if (baseIndex !== -1) {
                        previewWorkout[baseIndex] = { ...skillObj, isMastered: true }; 
                    }
                } 
            });

            const currentLevel = Math.floor(userXP / 100) + 1;
            const xpProgress = userXP % 100;

            return (
                <div className="p-6 pt-8 fade-in text-right">
                    <div className="flex justify-between items-center mb-8">
                        <button onClick={resetApp} className="text-xs text-zinc-500 bg-zinc-900 border border-zinc-800 p-2 px-4 rounded-full font-bold hover:text-white hover:border-red-500 transition-colors">איפוס נתונים מלא</button>
                        <div>
                            <div className="text-xs text-orange-500 font-bold uppercase tracking-widest mb-1">יום {currentDayHebrew}</div>
                            <h1 className="text-3xl font-black text-white tracking-tight">שלום, {userAnswers.name}</h1>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-2 gap-4 mb-8">
                        <div className="bg-gradient-to-b from-zinc-900 to-black p-6 rounded-[30px] border border-zinc-800 text-center shadow-lg relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-16 h-16 bg-orange-500 rounded-full blur-[40px] opacity-20"></div>
                            <div className="text-5xl font-black text-white mb-2">{currentLevel}</div>
                            <div className="text-[10px] text-orange-500 font-bold uppercase tracking-widest">רמה ({userXP} XP)</div>
                        </div>
                        <div className="bg-gradient-to-b from-zinc-900 to-black p-6 rounded-[30px] border border-zinc-800 text-center shadow-lg relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-16 h-16 bg-blue-500 rounded-full blur-[40px] opacity-20"></div>
                            <div className="text-5xl font-black text-white mb-2">{completedWorkouts}</div>
                            <div className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">אימונים הושלמו</div>
                        </div>
                    </div>
                    
                    {isWorkoutDayToday ? (
                        <div className="bg-gradient-to-bl from-orange-600 to-red-700 p-8 rounded-[40px] shadow-[0_15px_40px_rgba(249,115,22,0.3)] text-white relative overflow-hidden transition-transform">
                            <div className="absolute -top-4 -left-4 text-9xl font-black italic opacity-20 transform -rotate-12">⚡</div>
                            <div className="relative z-10 text-right">
                                <div className="text-xs font-black text-orange-200 uppercase tracking-widest mb-2">אימון מחושב להיום</div>
                                <h3 className="text-4xl font-black mb-6 tracking-tight">{workoutTitleForToday}</h3>
                                
                                <div className="bg-black/40 backdrop-blur-md rounded-3xl p-5 mb-8 border border-white/10 space-y-4 shadow-inner">
                                    <div className="text-xs font-bold text-orange-300">תצוגה מקדימה - שולב מהעץ:</div>
                                    {previewWorkout.slice(0, 4).map(exercise => (
                                        <div key={exercise.name} className="flex justify-between items-center text-sm border-b border-white/5 pb-2 last:border-0 last:pb-0">
                                            {exercise.isMastered ? <span className="text-[9px] bg-white text-orange-600 font-black px-2 py-1 rounded-md leading-none shadow-sm">🔥 מהעץ</span> : <span></span>} 
                                            <span className={`font-bold tracking-wide ${exercise.isMastered ? 'text-white' : 'text-zinc-300'}`}>{exercise.name}</span>
                                        </div>
                                    ))}
                                </div>
                                
                                <button onClick={() => setShowTimeModal(true)} className="w-full bg-white text-black font-black py-5 rounded-2xl text-xl hover:scale-[0.98] transition-transform shadow-xl">
                                    התחל אימון עכשיו
                                </button>
                            </div>
                        </div>
                    ) : ( 
                        <div className="p-10 bg-gradient-to-b from-zinc-900 to-black rounded-[40px] border border-zinc-800 text-center shadow-lg">
                            <div className="text-7xl mb-6 drop-shadow-xl pulse-orange inline-block">🔋</div>
                            <h3 className="text-3xl font-black text-white mb-3">יום מנוחה מתוכנן</h3>
                            <p className="text-zinc-400 text-sm font-medium leading-relaxed max-w-[250px] mx-auto">השריר נקרע במהלך האימון ונבנה בזמן המנוחה. תן לגוף זמן להתאושש לקראת האימון הבא שלך.</p>
                        </div> 
                    )}

                    {/* מודאל בחירת זמן לאימון */}
                    {showTimeModal && (
                        <div className="fixed inset-0 bg-black/95 backdrop-blur-xl flex justify-center items-center z-50 p-6 fade-in">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[40px] p-8 w-full max-w-sm text-right shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-orange-600 rounded-full blur-[80px] opacity-30"></div>
                                <h3 className="text-3xl font-black text-white mb-2 relative z-10">כמה זמן יש לך לאימון?</h3>
                                <p className="text-zinc-400 text-sm mb-8 relative z-10 font-medium">המנוע יחשב וישנה את כמות הסטים והתרגילים בהתאם לזמן שתבחר.</p>
                                
                                <div className="space-y-4 relative z-10">
                                    <button onClick={() => { setShowTimeModal(false); onStart(30); }} className="w-full flex justify-between items-center bg-zinc-950 border border-zinc-800 p-5 rounded-2xl font-bold text-lg hover:border-orange-500 transition-colors">
                                        <span className="text-zinc-500 text-sm">3 סטים / 4 תרגילים</span>
                                        <span className="text-white">30 דקות</span>
                                    </button>
                                    <button onClick={() => { setShowTimeModal(false); onStart(45); }} className="w-full flex justify-between items-center bg-orange-500/10 border border-orange-500 p-5 rounded-2xl font-bold text-lg text-white transition-colors shadow-[0_0_15px_rgba(249,115,22,0.2)]">
                                        <span className="text-orange-400 text-sm">קלאסי: 3 סטים / 5 תרגילים</span>
                                        <span>45 דקות</span>
                                    </button>
                                    <button onClick={() => { setShowTimeModal(false); onStart(60); }} className="w-full flex justify-between items-center bg-zinc-950 border border-zinc-800 p-5 rounded-2xl font-bold text-lg hover:border-orange-500 transition-colors">
                                        <span className="text-zinc-500 text-sm">מלא: 4 סטים / 5 תרגילים</span>
                                        <span className="text-white">60 דקות</span>
                                    </button>
                                    <button onClick={() => { setShowTimeModal(false); onStart(90); }} className="w-full flex justify-between items-center bg-zinc-950 border border-zinc-800 p-5 rounded-2xl font-bold text-lg hover:border-orange-500 transition-colors">
                                        <span className="text-zinc-500 text-sm">נפח מקסימלי</span>
                                        <span className="text-white">90 דקות</span>
                                    </button>
                                </div>
                                <button onClick={() => setShowTimeModal(false)} className="w-full mt-8 text-zinc-500 font-bold text-sm uppercase tracking-widest hover:text-white transition-colors relative z-10">ביטול וחזרה</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // 9. WORKOUT EXECUTION PLAYER
        // ==========================================
        function WorkoutExecutionView({ userAnswers, masteredSkills, duration, onWorkoutFinish, onWorkoutExit }) {
            const today = HEBREW_DAYS[new Date().getDay()];
            let workoutType = 'fbw'; 
            if (userAnswers.days?.length >= 3 && userAnswers.days.includes(today)) {
                workoutType = userAnswers.days.indexOf(today) % 2 === 0 ? 'upper' : 'lower';
            }
            
            const workoutPlan = useMemo(() => generateDynamicWorkout(workoutType, masteredSkills, duration), [masteredSkills, workoutType, duration]);

            const [currentExerciseIndex, setExerciseIndex] = useState(0); 
            const [currentSetIndex, setSetIndex] = useState(0); 
            const [isResting, setIsResting] = useState(false); 
            const [restTimer, setRestTimer] = useState(0);
            
            // טיימר מנוחה מדויק
            useEffect(() => { 
                let interval; 
                if (isResting && restTimer > 0) {
                    interval = setInterval(() => setRestTimer(prev => prev - 1), 1000); 
                } else if (restTimer === 0 && isResting) {
                    setIsResting(false); 
                }
                return () => clearInterval(interval); 
            }, [isResting, restTimer]);

            const handleSetComplete = () => { 
                const currentExercise = workoutPlan[currentExerciseIndex];
                const restSecondsNeeded = userAnswers.goal.includes('מסת') ? 90 : 60; // 90 שניות למסה, 60 לחיטוב

                if (currentExerciseIndex < workoutPlan.length - 1 || currentSetIndex + 1 < currentExercise.sets) { 
                    if (currentSetIndex + 1 < currentExercise.sets) {
                        setSetIndex(prev => prev + 1); 
                    } else {
                        setExerciseIndex(prev => prev + 1);
                        setSetIndex(0); 
                    } 
                    setRestTimer(restSecondsNeeded); 
                    setIsResting(true); 
                } else { 
                    onWorkoutFinish(); 
                    onWorkoutExit(); 
                } 
            };

            const currentEx = workoutPlan[currentExerciseIndex];

            // מסך מנוחה (REST)
            if (isResting) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-black text-center max-w-md mx-auto fade-in relative overflow-hidden">
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] bg-orange-600 rounded-full opacity-10 blur-[80px] pulse-orange"></div>
                        <div className="text-xs font-bold text-orange-500 uppercase tracking-widest mb-6 bg-orange-500/10 px-4 py-2 rounded-full border border-orange-500/30">זמן התאוששות שריר חובה</div>
                        <div className="text-[160px] font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-zinc-600 leading-none tabular-nums drop-shadow-2xl">{restTimer}</div>
                        <p className="text-zinc-500 font-bold uppercase mt-6 tracking-widest">שניות נותרו לסט הבא</p>
                    </div>
                );
            }

            // מסך ביצוע תרגיל
            return (
                <div className="min-h-screen p-6 flex flex-col text-center justify-center fade-in max-w-md mx-auto">
                    <div className="text-xs font-bold text-zinc-400 uppercase mb-8 bg-zinc-900 px-6 py-2 rounded-full inline-block mx-auto border border-zinc-800 tracking-widest shadow-inner">
                        סט {currentSetIndex + 1} מתוך {currentEx.sets}
                    </div>
                    
                    {currentEx.isMastered && (
                        <div className="text-orange-500 font-black text-sm mb-3 drop-shadow-md">🔥 תרגיל מתקדם מהעץ</div>
                    )}
                    
                    <h2 className="text-5xl font-black text-white mb-8 leading-tight tracking-tight">{currentEx.name}</h2>
                    
                    <div className="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-red-600 mb-2 drop-shadow-lg" style={{ direction: 'ltr' }}>
                        {currentEx.reps}
                    </div>
                    <div className="text-zinc-500 font-bold uppercase mb-auto tracking-widest">חזרות / זמן למטרה</div>
                    
                    <button onClick={handleSetComplete} className="w-full bg-white text-black py-6 rounded-[30px] font-black text-2xl shadow-[0_10px_40px_rgba(255,255,255,0.2)] active:scale-[0.98] transition-transform">
                        סיימתי את הסט ✓
                    </button>
                    
                    <button onClick={onWorkoutExit} className="mt-8 text-zinc-600 font-bold text-sm uppercase tracking-widest hover:text-white transition-colors">
                        יציאה מוקדמת מאימון
                    </button>
                </div>
            );
        }

        // ==========================================
        // 10. VISUAL SKILL TREE (One-Click Master)
        // ==========================================
        function SkillTreeView({ userXP, masteredSkills, toggleSkill, triggerToastNotification }) {
            
            // לוגיקת פתיחת תרגיל (חובה להשלים דרישות קדם)
            const isSkillUnlocked = (skill) => {
                if (!skill.req || skill.req.length === 0) return true; 
                return skill.req.every(reqId => masteredSkills.includes(reqId));
            };

            const handleSkillClick = (skill) => { 
                if (!isSkillUnlocked(skill)) { 
                    triggerToastNotification('🔒 נעול. עליך להשלים את התרגיל שמוביל אליו קודם!'); 
                    return; 
                } 
                toggleSkill(skill.id); 
                
                if (masteredSkills.includes(skill.id)) {
                    triggerToastNotification(`${skill.name} הוסר מהאימונים השוטפים שלך.`);
                } else {
                    triggerToastNotification(`🔥 אלוף! ${skill.name} יוזרק מעתה לאימונים שלך.`);
                }
            };

            const unlockedCount = SKILLS.filter(s => isSkillUnlocked(s)).length;

            return (
                <div className="p-6 pt-8 fade-in text-right">
                    <div className="mb-6">
                        <h1 className="text-4xl font-black mb-2 text-white tracking-tight">עץ מיומנויות</h1>
                        <p className="text-zinc-400 text-sm font-medium">קליק אחד על תרגיל פתוח יזריק אותו לאימון הבא שלך. <span className="text-orange-500 font-bold">{unlockedCount}</span> זמינים.</p>
                    </div>

                    <div className="bg-[#050505] rounded-[40px] border border-zinc-900 min-h-[800px] relative shadow-inner overflow-hidden mb-8">
                        {/* SVG Lines Connecting the Tree */}
                        <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="absolute inset-0 w-full h-full" style={{ zIndex: 0 }}>
                            {SKILLS.map(skill => skill.req.map(reqId => { 
                                const parentSkill = SKILLS.find(x => x.id === reqId); 
                                if (!parentSkill) return null; 
                                const isLineActive = masteredSkills.includes(reqId); 
                                return (
                                    <line 
                                        key={`${parentSkill.id}-${skill.id}`} 
                                        x1={parentSkill.x} 
                                        y1={100 - parentSkill.y} 
                                        x2={skill.x} 
                                        y2={100 - skill.y} 
                                        stroke={isLineActive ? '#f97316' : '#27272a'} 
                                        strokeWidth={isLineActive ? "0.8" : "0.4"} 
                                        opacity={isLineActive ? 0.9 : 0.4}
                                        style={{ transition: 'all 0.5s ease' }}
                                    />
                                ); 
                            }))}
                        </svg>

                        {/* Interactive Nodes */}
                        <div className="relative w-full h-full z-10">
                            {SKILLS.map(skill => {
                                const isMastered = masteredSkills.includes(skill.id); 
                                const isUnlocked = isSkillUnlocked(skill);

                                // Mastered Node (Gold/Orange)
                                if (isMastered) {
                                    return (
                                        <button key={skill.id} onClick={() => handleSkillClick(skill)} className="skill-node absolute -translate-x-1/2 translate-y-1/2 flex flex-col items-center justify-center bg-gradient-to-br from-orange-400 to-red-600 rounded-2xl px-4 py-3 shadow-[0_0_25px_rgba(249,115,22,0.9)] z-30 hover:scale-110" style={{ left: `${skill.x}%`, bottom: `${skill.y}%` }}>
                                            <span className="text-[12px] font-black text-white whitespace-nowrap drop-shadow-md">{skill.name}</span>
                                            <span className="text-[10px] font-black text-black mt-1 bg-white/90 px-2 py-0.5 rounded-full shadow-sm">הצלחתי! ✓</span>
                                        </button>
                                    );
                                }

                                // Unlocked Node (Ready to click)
                                if (isUnlocked) {
                                    return (
                                        <button key={skill.id} onClick={() => handleSkillClick(skill)} className="skill-node absolute -translate-x-1/2 translate-y-1/2 w-16 h-16 rounded-full flex flex-col items-center justify-center border-2 bg-black border-orange-500 shadow-[0_0_20px_rgba(249,115,22,0.5)] z-20 hover:scale-110 pulse-orange" style={{ left: `${skill.x}%`, bottom: `${skill.y}%` }}>
                                            <span className="text-[10px] font-black text-white text-center leading-tight px-1 drop-shadow-md">{skill.name}</span>
                                        </button>
                                    );
                                }

                                // Locked Node (Gray, unclickable visually)
                                return (
                                    <button key={skill.id} onClick={() => handleSkillClick(skill)} className="skill-node absolute -translate-x-1/2 translate-y-1/2 w-12 h-12 rounded-full border border-zinc-800 bg-zinc-950 opacity-60 z-10 hover:border-zinc-600 hover:opacity-100" style={{ left: `${skill.x}%`, bottom: `${skill.y}%` }}>
                                        <span className="text-[10px] text-zinc-600 font-bold mb-0.5">🔒</span>
                                        <span className="text-[7px] text-zinc-500 font-bold text-center px-1 leading-none">{skill.name.split(' ')[0]}</span>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 11. SMART DIET VIEW (Moods, Refresh, Macros)
        // ==========================================
        function NutritionView({ userAnswers }) {
            const [currentMood, setMood] = useState('training'); // 'training' | 'rest' | 'sick'
            const [refreshTrigger, setRefresh] = useState(0);
            
            const isCutPhase = userAnswers.goal === 'ירידה באחוזי שומן (חיטוב)';
            
            // חישוב TDEE אמיתי (Mifflin-St Jeor Equation)
            const targetDailyCalories = useMemo(() => { 
                const w = Number(userAnswers.weight) || 70; 
                const h = Number(userAnswers.height) || 175; 
                const a = Number(userAnswers.age) || 20; 
                const bmr = (10 * w) + (6.25 * h) - (5 * a) + 5; // נוסחה לגברים (בקירוב)
                const tdee = Math.round(bmr * 1.55); // רמת פעילות ממוצעת
                return isCutPhase ? tdee - 400 : tdee + 350; 
            }, [userAnswers, isCutPhase]);

            // סקיילינג דינמי של כמויות (בסיס 2500 קלוריות)
            const scalingFactor = targetDailyCalories / 2500;
            const dynamicEggsAmount = Math.max(2, Math.round(4 * scalingFactor)); 
            const dynamicChickenGrams = Math.max(100, Math.round(250 * scalingFactor));

            // סינון אלרגיות חכם
            const userAllergies = userAnswers.allergies || []; 
            const hasNoAllergies = !userAllergies.length || userAllergies.includes('ללא');
            
            const getRandomMeal = (timeOfDay) => { 
                const safeOptions = MEAL_PLANS[currentMood][timeOfDay].filter(meal => 
                    hasNoAllergies || !meal.tags.some(tag => userAllergies.map(a => ALLERGY_MAP[a]).includes(tag))
                ); 
                
                if (safeOptions.length === 0) {
                    return { name: 'סונן עקב אלרגיה', ings: 'לא מצאנו ארוחה בטוחה שמתאימה לאלרגיות שהזנת במצב זה.' };
                }
                
                // בחירה פסאודו-אקראית שמשתנה בלחיצה על כפתור הרענון
                return safeOptions[(refreshTrigger + timeOfDay.length) % safeOptions.length]; 
            };

            return (
                <div className="max-w-md mx-auto p-6 pt-8 fade-in text-right">
                    <h1 className="text-4xl font-black mb-2 text-white tracking-tight">תזונה חכמה</h1>
                    <p className="text-zinc-400 text-sm mb-6 font-medium">מחושב דינמית ל-<span className="text-orange-500 font-bold">{targetDailyCalories}</span> קלוריות ביום.</p>
                    
                    <div className="flex gap-3 mb-8 overflow-x-auto hide-scroll pb-2 snap-x">
                        <button onClick={() => setMood('training')} className={`snap-center px-6 py-3 rounded-full whitespace-nowrap font-bold text-sm transition-all duration-300 shadow-md ${currentMood === 'training' ? 'bg-orange-600 text-white scale-105' : 'bg-zinc-900 text-zinc-400 hover:bg-zinc-800'}`}>
                            ⚡ מתאמן היום
                        </button>
                        <button onClick={() => setMood('rest')} className={`snap-center px-6 py-3 rounded-full whitespace-nowrap font-bold text-sm transition-all duration-300 shadow-md ${currentMood === 'rest' ? 'bg-green-700 text-white scale-105' : 'bg-zinc-900 text-zinc-400 hover:bg-zinc-800'}`}>
                            🧘‍♂️ מנוחה / התאוששות
                        </button>
                        <button onClick={() => setMood('sick')} className={`snap-center px-6 py-3 rounded-full whitespace-nowrap font-bold text-sm transition-all duration-300 shadow-md ${currentMood === 'sick' ? 'bg-blue-600 text-white scale-105' : 'bg-zinc-900 text-zinc-400 hover:bg-zinc-800'}`}>
                            🤒 אני חולה (מנחם)
                        </button>
                    </div>
                    
                    <button onClick={() => setRefresh(prev => prev + 1)} className="w-full bg-gradient-to-r from-zinc-900 to-zinc-800 p-5 rounded-2xl mb-8 border border-zinc-700 font-black text-orange-500 active:scale-[0.98] transition-transform flex justify-center items-center gap-3 shadow-lg">
                        <span className="text-2xl">🔄</span> ערבב תפריט והחלף מנות
                    </button>
                    
                    {['morning', 'lunch', 'evening'].map(timeKey => { 
                        const currentMeal = getRandomMeal(timeKey); 
                        const timeLabel = timeKey === 'morning' ? 'ארוחת בוקר' : timeKey === 'lunch' ? 'ארוחת צהריים' : 'ארוחת ערב';
                        const mealKcal = Math.round((timeKey === 'lunch' ? 0.4 : 0.3) * targetDailyCalories); // צהריים 40%, בוקר/ערב 30%
                        
                        // הזרקת כמויות דינמיות למחרוזת
                        const customizedIngredients = currentMeal.ings ? 
                            currentMeal.ings.replace('200ג', `${dynamicChickenGrams}ג`)
                                          .replace('3 ביצים', `${dynamicEggsAmount} ביצים`)
                                          .replace('4 ביצים', `${dynamicEggsAmount} ביצים`)
                            : currentMeal.ings;

                        return (
                            <div key={timeKey} className="bg-zinc-900 p-6 rounded-[30px] border border-zinc-800 mb-6 relative overflow-hidden shadow-md">
                                <div className="absolute top-0 right-0 w-2 h-full bg-orange-600"></div>
                                <div className="text-xs font-black text-zinc-500 uppercase tracking-widest mb-2 pr-2">{timeLabel}</div>
                                <h3 className="text-2xl font-black mb-4 text-white pr-2 leading-tight">{currentMeal.name}</h3>
                                
                                <div className="bg-black/50 p-5 rounded-2xl text-sm text-zinc-300 border border-zinc-800/50 leading-relaxed font-medium">
                                    <div className="flex justify-between items-center mb-3 pb-3 border-b border-zinc-800">
                                        <span className="text-orange-500 font-bold">כמויות אישיות עבורך:</span>
                                        <span className="bg-zinc-800 text-xs px-2 py-1 rounded text-zinc-300 font-bold">~{mealKcal} קק"ל</span>
                                    </div>
                                    <div className="text-white/90">
                                        {customizedIngredients}
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        // ==========================================
        // INITIALIZE APP
        // ==========================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
